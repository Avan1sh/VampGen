services:
  db:
    image: postgres:16-alpine
    container_name: vampgen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vampgen
      POSTGRES_PASSWORD: vampgen
      POSTGRES_DB: vampgen
    ports:
      - "5432:5432"
    volumes:
      - vampgen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vampgen -d vampgen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vampgen_pgdata:
